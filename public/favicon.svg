<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="primaryGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <linearGradient id="secondaryGlow" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <rect width="120" height="120" rx="28" fill="#020617" />
  
  <g transform="translate(60, 60)" filter="url(#neon)">
    <!-- Sleek Fish Body -->
    <path d="M -25,0 C -5,-25 25,-25 40,0 C 25,25 -5,25 -25,0 Z" fill="url(#primaryGlow)" opacity="0.85" />
    <!-- Dynamic Tail -->
    <path d="M -25,0 L -45,-15 L -35,0 L -45,15 Z" fill="url(#secondaryGlow)" />
    <!-- Modern Eye -->
    <circle cx="20" cy="-5" r="4" fill="#020617" />
    <circle cx="21.5" cy="-6.5" r="1.5" fill="#ffffff" />
  </g>
</svg>
